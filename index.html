<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitrix24 AI Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0a0e1a;--surface:#111827;--card:#141c2e;--border:#1e2d45;--accent:#e8a923;--danger:#e85423;--success:#23c95e;--warning:#f0c040;--text:#e2e8f0;--dim:#718096;--font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:520px;}
.glow{box-shadow:0 0 40px rgba(232,169,35,0.15);border-color:rgba(232,169,35,0.4);}
label{display:block;font-size:11px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
input,select{width:100%;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;margin-bottom:4px;}
input{font-family:var(--mono);}
input:focus,select:focus{border-color:var(--accent);}
.hint{font-size:11px;color:#4a5568;margin-bottom:14px;}
.btn{width:100%;padding:13px;background:var(--accent);color:#0a0e1a;border:none;border-radius:8px;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:1px;text-transform:uppercase;}
.btn:hover{opacity:.85;}
.note{margin-top:14px;padding:12px;background:var(--surface);border-radius:8px;font-size:12px;color:var(--dim);line-height:1.7;}
.dash{padding:20px;max-width:1600px;margin:0 auto;}
.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
.kpi-lbl{font-size:10px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.kpi-val{font-size:30px;font-weight:800;font-family:var(--mono);line-height:1;}
.kpi-sub{font-size:11px;color:var(--dim);margin-top:4px;}
.ai-card{background:var(--card);border:1px solid rgba(232,169,35,0.4);border-radius:12px;padding:20px;margin-bottom:14px;box-shadow:0 0 20px rgba(232,169,35,0.07);}
.ai-row{display:flex;gap:18px;align-items:flex-start;}
.ai-body{flex:1;min-width:0;}
.ai-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px;}
.ai-col{background:var(--surface);border-radius:8px;padding:12px;}
.col-title{font-size:10px;letter-spacing:1px;font-weight:700;margin-bottom:8px;text-transform:uppercase;}
.bullet{font-size:12px;color:var(--dim);padding-left:12px;position:relative;margin-bottom:4px;line-height:1.5;}
.bullet::before{content:"·";position:absolute;left:0;font-weight:700;}
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:14px;}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;}
.sec-title{font-size:11px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;}
.chart-box{position:relative;height:160px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.tbl-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:1100px;}
th{padding:8px 10px;text-align:left;font-size:10px;color:var(--dim);letter-spacing:1px;font-weight:600;border-bottom:1px solid var(--border);text-transform:uppercase;white-space:nowrap;}
td{padding:9px 10px;border-bottom:1px solid rgba(30,45,69,0.5);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.02);}
.pb{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px;}
.pf{height:100%;border-radius:2px;}
.bdg{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:1px;text-transform:uppercase;}
.ov-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;}
.ov-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:rgba(232,84,35,0.08);border:1px solid rgba(232,84,35,0.15);border-radius:8px;margin-bottom:7px;gap:12px;}
.ov-days{font-size:11px;font-weight:700;padding:3px 9px;background:rgba(232,84,35,0.15);color:var(--danger);border-radius:6px;white-space:nowrap;flex-shrink:0;}
.rt-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(30,45,69,0.4);}
.rt-row:last-child{border-bottom:none;}
.sm-btn{padding:7px 13px;background:var(--surface);color:var(--dim);border:1px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer;font-weight:600;}
.acc-btn{padding:7px 13px;background:rgba(232,169,35,0.12);color:var(--accent);border:1px solid rgba(232,169,35,0.3);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
.pdf-btn{padding:7px 13px;background:rgba(99,102,241,0.15);color:#818cf8;border:1px solid rgba(99,102,241,0.35);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
.iter-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;font-family:var(--mono);}
.iter-good{background:rgba(35,201,94,0.15);color:#23c95e;}
.iter-warn{background:rgba(232,169,35,0.15);color:#e8a923;}
.iter-bad{background:rgba(232,84,35,0.15);color:#e85423;}
.weight-easy{background:rgba(35,201,94,0.15);color:#23c95e;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;}
.weight-med{background:rgba(232,169,35,0.15);color:#e8a923;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;}
.weight-hard{background:rgba(232,84,35,0.15);color:#e85423;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;}
.proj-tag{display:inline-block;background:rgba(74,144,217,0.15);color:#4a90d9;font-size:10px;padding:2px 7px;border-radius:10px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle;}
.detail-row{background:rgba(20,28,46,0.8)!important;}
.detail-row td{padding:6px 10px 10px 30px;}
.expand-btn{background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;padding:2px 6px;border-radius:4px;}
.expand-btn:hover{color:var(--text);background:rgba(255,255,255,0.05);}
.loading-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;text-align:center;}
.spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.proj-list{max-height:160px;overflow-y:auto;margin-top:8px;}
.proj-item{padding:8px 12px;cursor:pointer;border-radius:6px;font-size:13px;color:var(--text);}
.proj-item:hover{background:var(--surface);}
.proj-item.active{background:rgba(232,169,35,0.12);color:var(--accent);}
select option{background:var(--surface);color:var(--text);}
@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr);}.charts-row,.two-col{grid-template-columns:1fr;}.ai-cols{grid-template-columns:1fr;}.ai-row{flex-direction:column;}}
@media print{.no-print{display:none!important;}.dash{padding:8px!important;}body{background:#fff!important;color:#000!important;}.kpi,.ai-card,.tbl-card,.chart-card,.ov-card,.two-col .chart-card{background:#fff!important;border-color:#ccc!important;}}
</style>
</head>
<body>
<div id="app"></div>
<script>
var PIE=['#e8a923','#23c95e','#e85423','#6366f1','#06b6d4'];
var cfg={webhook:''},allGroups=[],barC=null,pieC=null,dynC=null;

function el(id){return document.getElementById(id);}

function showSetup(){
  var saved='';try{saved=localStorage.getItem('b24_webhook')||'';}catch(e){}
  el('app').innerHTML='<div class="wrap"><div class="card glow">'
    +'<div style="text-align:center;margin-bottom:24px;">'
    +'<div style="font-size:11px;letter-spacing:4px;color:var(--accent);font-weight:700;margin-bottom:8px;">BITRIX24 × AI</div>'
    +'<div style="font-size:26px;font-weight:700;margin-bottom:6px;">Аналитический дашборд</div>'
    +'<div style="font-size:13px;color:var(--dim);">Подключите Bitrix24 для анализа задач</div>'
    +'</div>'
    +'<label>Webhook URL</label>'
    +'<input id="wh" type="text" value="'+saved+'" placeholder="https://b24-aiw4ne.bitrix24.ru/rest/103/xxxxxxxx/">'
    +'<div class="hint">Разработчикам → Другое → Входящий вебхук</div>'
    +'<button class="btn" onclick="step1()">Подключить и загрузить →</button>'
    +'<div class="note"><strong style="color:var(--text);">Права вебхука:</strong> task · user · sonet_group</div>'
    +'</div></div>';
}

function showLoading(msg,sub){
  el('app').innerHTML='<div class="loading-wrap">'
    +'<div class="spinner"></div>'
    +'<div style="font-size:17px;font-weight:600;margin-bottom:6px;">'+msg+'</div>'
    +'<div style="font-size:13px;color:var(--dim);">'+(sub||'')+'</div>'
    +'</div>';
}

function showErr(msg){
  el('app').innerHTML='<div class="wrap"><div class="card" style="max-width:460px;text-align:center;">'
    +'<div style="font-size:30px;margin-bottom:12px;">⚠</div>'
    +'<div style="color:var(--danger);font-weight:700;font-size:17px;margin-bottom:10px;">Ошибка подключения</div>'
    +'<div style="font-size:12px;color:var(--dim);background:var(--surface);padding:10px;border-radius:8px;font-family:var(--mono);word-break:break-all;margin-bottom:18px;">'+msg+'</div>'
    +'<button class="btn" onclick="showSetup()">← Назад</button>'
    +'</div></div>';
}

async function b24(method,params){
  var url=cfg.webhook.replace(/\/$/,'')+'/'+method+'.json';
  var qs=new URLSearchParams();
  function flat(obj,pfx){
    Object.entries(obj||{}).forEach(function(kv){
      var k=kv[0],v=kv[1],key=pfx?pfx+'['+k+']':k;
      if(Array.isArray(v))v.forEach(function(i,idx){qs.append(key+'['+idx+']',i);});
      else if(v!==null&&typeof v==='object')flat(v,key);
      else qs.append(key,v);
    });
  }
  flat(params||{},'');
  var r=await fetch(url+'?'+qs);
  if(!r.ok)throw new Error('HTTP '+r.status);
  var d=await r.json();
  if(d.error)throw new Error(d.error_description||d.error);
  return d.result;
}

async function step1(){
  var wh=el('wh').value.trim();
  if(!wh){alert('Введите Webhook URL');return;}
  cfg.webhook=wh;
  try{localStorage.setItem('b24_webhook',wh);}catch(e){}
  showLoading('Подключаемся...','Загружаем список проектов');
  try{
    await b24('profile',{});
    var groups=await fetchGroups();
    allGroups=groups;
    showProjectStep(groups);
  }catch(e){showErr(e.message);}
}

async function fetchGroups(){
  try{
    var all=[],start=0;
    while(true){
      var r=await b24('sonet_group.get',{filter:{ACTIVE:'Y'},select:['ID','NAME'],start:start});
      var arr=Array.isArray(r)?r:(r.groups||[]);
      all=all.concat(arr);
      if(arr.length<50)break;
      start+=50;
    }
    return all.sort(function(a,b){return a.NAME.localeCompare(b.NAME,'ru');});
  }catch(e){return[];}
}

function showProjectStep(groups){
  var opts='<option value="">— Все задачи —</option>';
  groups.forEach(function(g){opts+='<option value="'+g.ID+'">'+g.NAME+'</option>';});

  el('app').innerHTML='<div class="wrap"><div class="card" style="max-width:520px;">'
    +'<div style="text-align:center;margin-bottom:22px;">'
    +'<div style="font-size:11px;letter-spacing:3px;color:var(--accent);font-weight:700;margin-bottom:6px;">ШАГ 2</div>'
    +'<div style="font-size:22px;font-weight:700;">Выберите проект и период</div>'
    +'</div>'
    +'<label>Проект / Группа (найдено: '+groups.length+')</label>'
    +'<select id="proj" style="margin-bottom:4px;">'+opts+'</select>'
    +'<div class="hint" style="margin-bottom:14px;">Выберите конкретный проект или оставьте пустым для всех задач</div>'
    +'<label>Период</label>'
    +'<select id="period" style="margin-bottom:20px;">'
    +'<option value="0">Всё время</option>'
    +'<option value="30" selected>30 дней</option>'
    +'<option value="90">90 дней</option>'
    +'<option value="180">180 дней</option>'
    +'<option value="365">1 год</option>'
    +'</select>'
    +'<button class="btn" onclick="loadData()">Загрузить и анализировать →</button>'
    +'<div style="margin-top:10px;text-align:center;">'
    +'<button onclick="showSetup()" style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;">← Изменить вебхук</button>'
    +'</div></div></div>';
}

async function loadData(){
  var projEl=el('proj'),perEl=el('period');
  cfg.project=projEl?projEl.value:'';
  cfg.period=perEl?parseInt(perEl.value):30;
  cfg.projName=cfg.project?(allGroups.find(function(g){return g.ID==cfg.project;})||{NAME:'Проект #'+cfg.project}).NAME:'Все задачи';
  await doLoad();
}

async function doLoad(){
  try{
    showLoading('Загружаем задачи...','Проект: '+cfg.projName+(cfg.period?' · '+cfg.period+' дн.':''));
    var tasks=await fetchTasks();
    showLoading('Получаем сотрудников...','Загружено задач: '+tasks.length);
    var uids=[...new Set(tasks.map(function(t){return t.responsibleId||t.RESPONSIBLE_ID;}).filter(Boolean))];
    var users=await fetchUsers(uids);
    showLoading('Загружаем историю задач...','Считаем итерации (30-60 сек)');
    var iterations=await fetchIterations(tasks);
    showLoading('Анализируем данные...');
    var data=calcData(tasks,users,iterations);
    showLoading('AI анализирует...','Формируем отчёт');
    var ai=await runAI(data);
    renderDash(data,ai);
  }catch(e){showErr(e.message);}
}

async function fetchTasks(){
  var all=[],start=0,filter={};
  if(cfg.project)filter.GROUP_ID=cfg.project;
  if(cfg.period){
    var d=new Date();d.setDate(d.getDate()-cfg.period);
    filter['>=CREATED_DATE']=d.toISOString().slice(0,10);
  }
  while(true){
    var r=await b24('tasks.task.list',{filter:filter,start:start,
      select:['ID','TITLE','RESPONSIBLE_ID','STATUS','DEADLINE','CREATED_DATE','CLOSED_DATE','GROUP_ID','MARK','PRIORITY']});
    var t=r.tasks||[];
    all=all.concat(t);
    if(t.length<50)break;
    start+=50;
  }
  return all;
}

async function fetchUsers(ids){
  if(!ids.length)return{};
  try{
    var r=await b24('user.get',{filter:{ID:ids}});
    var arr=Array.isArray(r)?r:[];
    var map={};
    arr.forEach(function(u){map[u.ID]=(u.NAME+' '+u.LAST_NAME).trim();});
    return map;
  }catch(e){return{};}
}

async function fetchIterations(tasks){
  var map={};
  var closed=tasks.filter(function(t){var st=t.status||t.STATUS;return st==='4'||st==='5';}).slice(0,50);
  for(var i=0;i<closed.length;i++){
    var tid=closed[i].id||closed[i].ID;
    try{
      var hist=await b24('tasks.task.history.list',{taskId:tid});
      var list=Array.isArray(hist.list)?hist.list:[];
      var returns=0,prevStatus='';
      list.forEach(function(h){
        if(h.field==='STATUS'||h.field==='status'){
          var nv=h.value&&h.value.to;
          if((nv==='3'||nv==='In Progress')&&(prevStatus==='4'||prevStatus==='Completed'))returns++;
          prevStatus=nv||prevStatus;
        }
      });
      map[tid]=returns;
    }catch(e){map[tid]=0;}
  }
  return map;
}

function weightLabel(mark,priority){
  // MARK field: '' = normal, 'positive' = easy, 'negative' = hard
  // Also check PRIORITY: 0=low, 1=normal, 2=high
  if(mark==='positive'||mark==='1')return{label:'Лёгкая',cls:'weight-easy',score:1};
  if(mark==='negative'||mark==='3')return{label:'Сложная',cls:'weight-hard',score:3};
  if(priority==='2')return{label:'Сложная',cls:'weight-hard',score:3};
  return{label:'Средняя',cls:'weight-med',score:2};
}

function calcData(tasks,users,iterations){
  var now=new Date();
  var sm={'1':'Новая','2':'Ожидает','3':'В работе','4':'Завершена','5':'Отложена'};
  var emp={};

  // Карта групп из allGroups
  var groupMap={};
  allGroups.forEach(function(g){groupMap[g.ID]=g.NAME;});

  tasks.forEach(function(t){
    var uid=t.responsibleId||t.RESPONSIBLE_ID;
    var name=users[uid]||('Сотрудник #'+uid);
    var gid=t.groupId||t.GROUP_ID||'';
    var gname=groupMap[gid]||gid||'Без проекта';
    var mark=t.mark||t.MARK||'';
    var priority=t.priority||t.PRIORITY||'1';
    var w=weightLabel(mark,priority);
    var tid=String(t.id||t.ID);

    if(!emp[name])emp[name]={name:name,total:0,done:0,overdue:0,inProgress:0,
      totalDays:0,doneCount:0,score:0,totalIter:0,iterCount:0,
      weightSum:0,projects:{},tasks:[]};

    emp[name].total++;
    emp[name].weightSum+=w.score;
    emp[name].projects[gname]=(emp[name].projects[gname]||0)+1;
    emp[name].tasks.push({id:tid,title:t.title||t.TITLE,weight:w,project:gname,status:sm[t.status||t.STATUS]||'Неизвестно'});

    var st=t.status||t.STATUS;
    if(st==='4'||st==='5'){
      emp[name].done++;
      var cd=new Date(t.createdDate||t.CREATED_DATE);
      var cl=t.closedDate||t.CLOSED_DATE;
      if(cl){var days=Math.floor((new Date(cl)-cd)/86400000);if(days>=0){emp[name].totalDays+=days;emp[name].doneCount++;}}
      if(iterations[tid]!==undefined){emp[name].totalIter+=iterations[tid];emp[name].iterCount++;}
    }
    if(st==='3')emp[name].inProgress++;
    var dl=t.deadline||t.DEADLINE;
    if(dl&&new Date(dl)<now&&st!=='4')emp[name].overdue++;
  });

  Object.values(emp).forEach(function(e){
    e.avgDays=e.doneCount?Math.round(e.totalDays/e.doneCount):0;
    e.avgIter=e.iterCount?Math.round(e.totalIter/e.iterCount*10)/10:0;
    e.avgWeight=e.total?Math.round(e.weightSum/e.total*10)/10:0;
    var or=e.total?e.overdue/e.total:0;
    var dr=e.total?e.done/e.total:0;
    var ir=e.avgIter>0?(e.avgIter>2?0:e.avgIter>1?0.15:0.25):0.25;
    e.score=Math.max(0,Math.round(dr*55+(1-or)*35+ir*10));
    // Топ проекты сотрудника
    e.topProjects=Object.entries(e.projects).sort(function(a,b){return b[1]-a[1];}).slice(0,3);
  });

  // Веса по всем задачам
  var weightDist={easy:0,med:0,hard:0};
  tasks.forEach(function(t){
    var w=weightLabel(t.mark||t.MARK||'',t.priority||t.PRIORITY||'1');
    if(w.score===1)weightDist.easy++;
    else if(w.score===3)weightDist.hard++;
    else weightDist.med++;
  });

  var overdue=tasks.filter(function(t){
    var dl=t.deadline||t.DEADLINE,st=t.status||t.STATUS;
    return dl&&new Date(dl)<now&&st!=='4';
  }).map(function(t){
    var gid=t.groupId||t.GROUP_ID||'';
    return{id:t.id||t.ID,title:t.title||t.TITLE,
      responsible:users[t.responsibleId||t.RESPONSIBLE_ID]||('#'+(t.responsibleId||t.RESPONSIBLE_ID)),
      deadline:t.deadline||t.DEADLINE,
      days:Math.floor((now-new Date(t.deadline||t.DEADLINE))/86400000),
      project:allGroups.find(function(g){return g.ID==gid;})?allGroups.find(function(g){return g.ID==gid;}).NAME:(gid||'—')
    };
  }).sort(function(a,b){return b.days-a.days;});

  var sacc={};
  tasks.forEach(function(t){var s=sm[t.status||t.STATUS]||'Неизвестно';sacc[s]=(sacc[s]||0)+1;});

  var months=[];
  for(var m=5;m>=0;m--){
    var d=new Date(now);d.setMonth(d.getMonth()-m);
    var lbl=d.toLocaleDateString('ru',{month:'short',year:'2-digit'});
    var ms=new Date(d.getFullYear(),d.getMonth(),1);
    var me=new Date(d.getFullYear(),d.getMonth()+1,0);
    months.push({label:lbl,
      created:tasks.filter(function(t){var dd=new Date(t.createdDate||t.CREATED_DATE);return dd>=ms&&dd<=me;}).length,
      closed:tasks.filter(function(t){var cl=t.closedDate||t.CLOSED_DATE;return cl&&new Date(cl)>=ms&&new Date(cl)<=me;}).length
    });
  }
  var weeks=[];
  for(var w2=7;w2>=0;w2--){
    var ws=new Date(now);ws.setDate(now.getDate()-w2*7-6);
    var we=new Date(now);we.setDate(now.getDate()-w2*7);
    weeks.push({label:'Н-'+(8-w2),count:tasks.filter(function(t){var dd=new Date(t.createdDate||t.CREATED_DATE);return dd>=ws&&dd<=we;}).length});
  }

  var topIter=Object.entries(iterations).filter(function(e){return e[1]>0;}).map(function(e){
    var t=tasks.find(function(t){return String(t.id||t.ID)===String(e[0]);});
    var gid=t?(t.groupId||t.GROUP_ID||''):'';
    return{id:e[0],title:t?(t.title||t.TITLE):'#'+e[0],iters:e[1],
      responsible:t?users[t.responsibleId||t.RESPONSIBLE_ID]||'':'',
      project:allGroups.find(function(g){return g.ID==gid;})?allGroups.find(function(g){return g.ID==gid;}).NAME:''
    };
  }).sort(function(a,b){return b.iters-a.iters;}).slice(0,5);

  var employees=Object.values(emp).sort(function(a,b){return b.total-a.total;});
  var topRating=[].concat(employees).sort(function(a,b){return b.score-a.score;}).slice(0,10);
  var avgIter=employees.filter(function(e){return e.iterCount>0;});
  var globalAvgIter=avgIter.length?Math.round(avgIter.reduce(function(s,e){return s+e.avgIter;},0)/avgIter.length*10)/10:0;

  // ── Project-level analytics ──
  var projAcc={};
  tasks.forEach(function(t){
    var gid=t.groupId||t.GROUP_ID||'';
    var gname=groupMap[gid]||gid||'Без проекта';
    var st=t.status||t.STATUS;
    var dl=t.deadline||t.DEADLINE;
    var uid=t.responsibleId||t.RESPONSIBLE_ID;
    if(!projAcc[gname])projAcc[gname]={name:gname,total:0,done:0,inProgress:0,overdue:0,
      members:new Set(),totalDays:0,doneCount:0,weightSum:0};
    var p=projAcc[gname];
    p.total++;
    if(uid)p.members.add(uid);
    var w=weightLabel(t.mark||t.MARK||'',t.priority||t.PRIORITY||'1');
    p.weightSum+=w.score;
    if(st==='4'||st==='5'){
      p.done++;
      var cd=new Date(t.createdDate||t.CREATED_DATE);
      var cl=t.closedDate||t.CLOSED_DATE;
      if(cl){var dys=Math.floor((new Date(cl)-cd)/86400000);if(dys>=0){p.totalDays+=dys;p.doneCount++;}}
    }
    if(st==='3')p.inProgress++;
    if(dl&&new Date(dl)<now&&st!=='4')p.overdue++;
  });
  var projects=Object.values(projAcc).map(function(p){
    return{
      name:p.name,total:p.total,done:p.done,inProgress:p.inProgress,overdue:p.overdue,
      members:p.members.size,
      pctDone:p.total?Math.round(p.done/p.total*100):0,
      pctOverdue:p.total?Math.round(p.overdue/p.total*100):0,
      avgDays:p.doneCount?Math.round(p.totalDays/p.doneCount):0,
      avgWeight:p.total?Math.round(p.weightSum/p.total*10)/10:0
    };
  }).sort(function(a,b){return b.total-a.total;});

  // ── Workload buckets per employee ──
  var now7=new Date(now);now7.setDate(now.getDate()-7);
  var now14=new Date(now);now14.setDate(now.getDate()-14);
  var now30=new Date(now);now30.setDate(now.getDate()-30);
  Object.values(emp).forEach(function(e){
    // count tasks created in last 7/14/30 days
    e.last7=e.tasks.filter(function(t){
      var orig=tasks.find(function(x){return String(x.id||x.ID)===String(t.id);});
      if(!orig)return false;
      var cd=new Date(orig.createdDate||orig.CREATED_DATE);
      return cd>=now7;
    }).length;
    e.last14=e.tasks.filter(function(t){
      var orig=tasks.find(function(x){return String(x.id||x.ID)===String(t.id);});
      if(!orig)return false;
      var cd=new Date(orig.createdDate||orig.CREATED_DATE);
      return cd>=now14&&cd<now7;
    }).length;
    // overdue ratio
    e.overdueRatio=e.total?Math.round(e.overdue/e.total*100):0;
    // completion ratio
    e.completionRatio=e.total?Math.round(e.done/e.total*100):0;
    // load status
    if(e.inProgress>=8||e.overdue>=4)e.loadStatus='перегрузка';
    else if(e.inProgress>=4||e.overdue>=2)e.loadStatus='высокая';
    else if(e.inProgress>=1)e.loadStatus='норма';
    else e.loadStatus='свободен';
  });

  return{employees:employees,topRating:topRating,overdue:overdue,statusDist:Object.entries(sacc),
    weeks:weeks,months:months,total:tasks.length,topIter:topIter,globalAvgIter:globalAvgIter,
    weightDist:weightDist,projects:projects};
}

async function runAI(data){
  var or=data.total?Math.round(data.overdue.length/data.total*100):0;
  var te=data.employees.slice(0,8);
  var to=data.overdue.slice(0,4);
  var es=te.map(function(e){return e.name+' задач:'+e.total+' вес:'+e.avgWeight+' проектов:'+Object.keys(e.projects).length+' просрочено:'+e.overdue+' итерации:'+e.avgIter+' рейтинг:'+e.score;}).join('; ');
  var os=to.map(function(t){return '"'+t.title+'" '+t.days+'дн '+t.responsible+' ['+t.project+']';}).join('; ');
  var ws='Лёгких:'+data.weightDist.easy+' Средних:'+data.weightDist.med+' Сложных:'+data.weightDist.hard;
  var p1='Ты аналитик строительной компании. Проанализируй данные Bitrix24 на русском языке.';
  var p2='Всего задач: '+data.total+'. Просроченных: '+data.overdue.length+' ('+or+'%). Ср. итерации: '+data.globalAvgIter+'. Распределение по весу: '+ws+'.';
  var p3='Топ просроченных: '+os+'. Сотрудники: '+es+'.';
  var p4='Верни ТОЛЬКО JSON: {"summary":"оценка","risks":["р1","р2","р3"],"bottlenecks":["б1","б2"],"topIssues":[{"employee":"имя","issue":"проблема","severity":"high"}],"recommendations":["рек1","рек2","рек3"],"overallScore":25}';
  var prompt=p1+'\n'+p2+'\n'+p3+'\n'+p4;
  try{
    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,messages:[{role:'user',content:prompt}]})
    });
    var d=await r.json();
    if(d.error)throw new Error(JSON.stringify(d.error));
    var txt=(d.content||[]).map(function(b){return b.text||'';}).join('').trim();
    var s=txt.indexOf('{'),e2=txt.lastIndexOf('}');
    if(s>=0&&e2>s)return JSON.parse(txt.slice(s,e2+1));
    throw new Error('no json');
  }catch(e){
    var score=Math.max(5,100-Math.round(data.overdue.length/Math.max(data.total,1)*100));
    return{
      summary:'В системе '+data.total+' задач. Просроченных: '+data.overdue.length+'. Ср. вес задач по команде отображён в таблице.',
      risks:['Задачи не закрываются в день сдачи','Отсутствуют дедлайны у части задач','Накопление незакрытых задач'],
      bottlenecks:['Задачи в статусе Ожидание без движения','Возвраты не фиксируются через систему'],
      topIssues:data.employees.filter(function(e){return e.overdue>5;}).slice(0,3).map(function(e){return{employee:e.name,issue:e.overdue+' просроченных',severity:'high'};}),
      recommendations:['Закрывать задачи в день сдачи','Установить дедлайн для каждой задачи','Использовать кнопку возврата на доработку'],
      overallScore:score
    };
  }
}

function switchTab(tab){

function sortLoad(col){

}
function filterLoad(v){_loadFilter=v.toLowerCase();renderLoadTable();}
function filterLoadStatus(v){_loadFilter2=v;renderLoadTable();}

function renderLoadTable(){
  var d=window._dd;if(!d)return;

  emps.sort(function(a,b){
    var av=a[_loadSort.col]||0,bv=b[_loadSort.col]||0;
    if(typeof av==='string')return _loadSort.dir*(av.localeCompare(bv,'ru'));

    var active=_loadSort.col===col;
    var arrow=active?(_loadSort.dir===-1?' &#8595;':' &#8593;'):'';

  };
  var html='<table><thead><tr>'+th('name','Сотрудник')+th('total','Всего')+th('inProgress','В работе')+th('done','Выполнено')+th('overdue','Просрочено')+th('overdueRatio','% просрочек')+th('completionRatio','% выполнения')+th('avgDays','Ср.дней')+th('avgWeight','Вес')+th('score','Рейтинг')+th('loadStatus','Загрузка')+'</tr></thead><tbody>';

    var miniBar=function(v,max,color){
      var pct=max?Math.min(100,Math.round(v/max*100)):0;
      return '<div style="display:flex;align-items:center;gap:5px;"><div style="flex:1;background:var(--border);border-radius:3px;height:5px;min-width:40px;"><div style="width:'+pct+'%;height:5px;border-radius:3px;background:'+color+';"></div></div><span style="font-family:var(--mono);font-size:11px;min-width:18px;text-align:right;">'+v+'</span></div>';
    };
    html+='<tr>'
      +'<td><div style="font-weight:600;">'+e.name+'</div>'
      +'<div style="font-size:10px;color:var(--dim);">'+Object.keys(e.projects).length+' проект(ов)</div></td>'
      +'<td>'+miniBar(e.total,maxTotal,'var(--accent)')+'</td>'
      +'<td>'+miniBar(e.inProgress,e.total,'#e8a923')+'</td>'
      +'<td>'+miniBar(e.done,e.total,'#23c95e')+'</td>'
      +'<td style="color:'+(e.overdue>0?'#e85423':'#718096')+';font-weight:'+(e.overdue>0?'700':'400')+';">'+(e.overdue>0?'&#9888; ':'')+e.overdue+'</td>'
      +'<td><span style="font-family:var(--mono);font-size:12px;color:'+(e.overdueRatio>30?'#e85423':e.overdueRatio>10?'#e8a923':'#23c95e')+';">'+e.overdueRatio+'%</span></td>'
      +'<td><span style="font-family:var(--mono);font-size:12px;color:'+(e.completionRatio>70?'#23c95e':e.completionRatio>40?'#e8a923':'#e85423')+';">'+e.completionRatio+'%</span></td>'
      +'<td style="font-family:var(--mono);color:var(--dim);">'+(e.avgDays?e.avgDays+' д':'—')+'</td>'
      +'<td style="font-size:11px;color:'+(e.avgWeight>=2.5?'#e85423':e.avgWeight>=1.8?'#e8a923':'#23c95e')+';">'+e.avgWeight+'</td>'

function exportCSV(){
  if(!window._dd)return;
  var rows=[['Сотрудник','Всего','В работе','Выполнено','Просрочено','Вес','Итерации','Ср.дней','Рейтинг','Статус','Проекты']];

    rows.push([e.name,e.total,e.inProgress,e.done,e.overdue,e.avgWeight,e.avgIter||0,e.avgDays||0,e.score,e.overdue>2?'критично':e.overdue>0?'внимание':'норма',e.topProjects.map(function(p){return p[0]+'('+p[1]+')';}).join('; ')]);
  });
  var csv=String.fromCharCode(0xFEFF);
  rows.forEach(function(r){csv+=r.map(function(v){return String(v).replace(/;/g,' ');}).join(';')+'\n';});
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='b24-report-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='b24-projects-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

}

showSetup();
</script>
